<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招聘信息聚合工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; color: #333; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; margin: 20px 0; color: #2c3e50; }

  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 180px; background: #fff; border-radius: 8px; padding: 16px;
               box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .stat-card .label { font-size: 13px; color: #999; margin-bottom: 4px; }
  .stat-card .value { font-size: 24px; font-weight: bold; color: #3498db; }

  .search-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #fff;
                padding: 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                flex-wrap: wrap; align-items: center; }
  .search-bar input { flex: 1; min-width: 180px; padding: 10px 14px; border: 1px solid #ddd;
                      border-radius: 6px; font-size: 14px; }
  .search-bar select { padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  .search-bar button { padding: 10px 20px; background: #3498db; color: #fff; border: none;
                       border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .search-bar button:hover { background: #2980b9; }
  .btn-export { background: #27ae60 !important; }
  .btn-export:hover { background: #219a52 !important; }

  .charts-row { display: flex; gap: 16px; margin-bottom: 20px; }
  .chart-box { flex: 1; min-width: 400px; height: 300px; background: #fff;
               border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .result-info { margin-bottom: 12px; color: #666; font-size: 14px; }
  table { width: 100%; background: #fff; border-radius: 8px; overflow: hidden;
          box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-collapse: collapse; }
  th { background: #3498db; color: #fff; padding: 12px 16px; text-align: left; font-weight: 500; }
  td { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #f8f9ff; }
  .tag { display: inline-block; background: #eef2ff; color: #4a6cf7; padding: 2px 8px;
         border-radius: 4px; font-size: 12px; margin: 2px 3px 2px 0; }
  .salary { color: #e74c3c; font-weight: 500; white-space: nowrap; }

  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px;
                margin-top: 20px; }
  .pagination button { padding: 8px 16px; border: 1px solid #ddd; background: #fff;
                       border-radius: 6px; cursor: pointer; font-size: 14px; }
  .pagination button:hover { background: #f0f0f0; }
  .pagination button:disabled { color: #ccc; cursor: default; background: #f9f9f9; }
  .pagination .current { padding: 8px 16px; background: #3498db; color: #fff;
                         border-radius: 6px; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <h1>Python 招聘信息聚合</h1>

  <div class="stats">
    <div class="stat-card">
      <div class="label">岗位总数</div>
      <div class="value" id="totalJobs">-</div>
    </div>
    <div class="stat-card">
      <div class="label">城市最多</div>
      <div class="value" id="topCity">-</div>
    </div>
    <div class="stat-card">
      <div class="label">公司最多</div>
      <div class="value" id="topCompany">-</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-box" id="cityChart"></div>
    <div class="chart-box" id="companyChart"></div>
  </div>

  <div class="search-bar">
    <input type="text" id="keywordInput" placeholder="输入关键词，如 Python、后端、爬虫...">
    <select id="locationSelect">
      <option value="">全部城市</option>
    </select>
    <select id="sortSelect">
      <option value="">默认排序</option>
      <option value="salary_desc">薪资从高到低</option>
      <option value="salary_asc">薪资从低到高</option>
    </select>
    <button onclick="doSearch(1)">搜索</button>
    <button class="btn-export" onclick="exportCSV()">导出 CSV</button>
  </div>

  <div class="result-info" id="resultInfo"></div>
  <table>
    <thead>
      <tr>
        <th>岗位名称</th>
        <th>公司</th>
        <th>城市</th>
        <th>薪资</th>
        <th>技能要求</th>
      </tr>
    </thead>
    <tbody id="jobTableBody"></tbody>
  </table>

  <div class="pagination" id="pagination"></div>
</div>

<script>
const API = "";
let currentPage = 1;

async function init() {
  await Promise.all([loadStats(), loadLocations(), loadCharts(), doSearch(1)]);
}

async function loadStats() {
  const resp = await fetch(API + "/api/stats");
  const data = await resp.json();
  document.getElementById("totalJobs").textContent = data.total;
  document.getElementById("topCity").textContent = data.top_cities[0]?.location || "-";
  document.getElementById("topCompany").textContent = data.top_companies[0]?.company || "-";
}

async function loadLocations() {
  const resp = await fetch(API + "/api/locations");
  const data = await resp.json();
  const select = document.getElementById("locationSelect");
  data.locations.forEach(city => {
    const opt = document.createElement("option");
    opt.value = city;
    opt.textContent = city;
    select.appendChild(opt);
  });
}

async function loadCharts() {
  const resp = await fetch(API + "/api/charts");
  const data = await resp.json();

  // 城市分布柱状图
  const cityChart = echarts.init(document.getElementById("cityChart"));
  cityChart.setOption({
    title: { text: "城市岗位分布", left: "center", textStyle: { fontSize: 14 } },
    tooltip: {},
    xAxis: { type: "category", data: data.city_distribution.map(d => d.name), axisLabel: { fontSize: 11 } },
    yAxis: { type: "value" },
    grid: { top: 40, bottom: 30, left: 40, right: 20 },
    series: [{ type: "bar", data: data.city_distribution.map(d => d.value),
               itemStyle: { color: "#3498db" } }],
  });

  // 公司分布饼图
  const companyChart = echarts.init(document.getElementById("companyChart"));
  companyChart.setOption({
    title: { text: "公司岗位数量 TOP 10", left: "center", textStyle: { fontSize: 14 } },
    tooltip: { trigger: "item" },
    series: [{
      type: "pie", radius: ["30%", "65%"],
      data: data.company_distribution.map(d => ({ name: d.name, value: d.value })),
      label: { fontSize: 11 },
    }],
  });

  window.addEventListener("resize", () => { cityChart.resize(); companyChart.resize(); });
}

async function doSearch(page) {
  currentPage = page;
  const params = new URLSearchParams();
  const keyword = document.getElementById("keywordInput").value;
  const location = document.getElementById("locationSelect").value;
  const sortBy = document.getElementById("sortSelect").value;
  if (keyword) params.set("keyword", keyword);
  if (location) params.set("location", location);
  if (sortBy) params.set("sort_by", sortBy);
  params.set("page", page);
  params.set("page_size", "10");

  const resp = await fetch(API + "/api/jobs?" + params.toString());
  const data = await resp.json();

  document.getElementById("resultInfo").textContent =
    `共 ${data.total} 条，第 ${data.page}/${data.total_pages} 页`;
  renderTable(data.jobs);
  renderPagination(data.page, data.total_pages);
}

function exportCSV() {
  const params = new URLSearchParams();
  const keyword = document.getElementById("keywordInput").value;
  const location = document.getElementById("locationSelect").value;
  if (keyword) params.set("keyword", keyword);
  if (location) params.set("location", location);

  // 直接下载 CSV
  const a = document.createElement("a");
  a.href = API + "/api/jobs/export?" + params.toString();
  a.download = "jobs.csv";
  a.click();
}

function renderTable(jobs) {
  const tbody = document.getElementById("jobTableBody");
  if (jobs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:#999;">暂无数据</td></tr>`;
    return;
  }
  tbody.innerHTML = jobs.map(job => `
    <tr>
      <td><strong>${escapeHtml(job.title)}</strong></td>
      <td>${escapeHtml(job.company)}</td>
      <td>${escapeHtml(job.location)}</td>
      <td class="salary">${escapeHtml(job.salary)}</td>
      <td>${job.tags.split(", ").map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}</td>
    </tr>
  `).join("");
}

function renderPagination(page, totalPages) {
  const container = document.getElementById("pagination");
  if (totalPages <= 1) { container.innerHTML = ""; return; }

  let html = `<button ${page === 1 ? "disabled" : ""} onclick="doSearch(${page - 1})">上一页</button>`;
  for (let i = 1; i <= totalPages; i++) {
    html += (i === page)
      ? `<span class="current">${i}</span>`
      : `<button onclick="doSearch(${i})">${i}</button>`;
  }
  html += `<button ${page === totalPages ? "disabled" : ""} onclick="doSearch(${page + 1})">下一页</button>`;
  container.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
</body>
</html>
